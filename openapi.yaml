openapi: 3.0.3
info:
  title: DEMO-GOB SISCAT API
  version: 1.0.0
  description: Endpoints del backend demo para catalogo, servicios, items y capturas SISCAT.
servers:
  - url: http://127.0.0.1:8081
    description: Docker local
tags:
  - name: Health
  - name: Catalogo
  - name: Capturas
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Verifica estado del backend
      responses:
        "200":
          description: Backend disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/session:
    get:
      tags: [Catalogo]
      summary: Obtiene establecimiento, usuario y modulos
      responses:
        "200":
          description: Datos de sesion demo
          content:
            application/json:
              schema:
                type: object
                properties:
                  establishment:
                    $ref: "#/components/schemas/Establishment"
                  user:
                    $ref: "#/components/schemas/User"
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/Module"
  /api/catalog:
    get:
      tags: [Catalogo]
      summary: Obtiene todo el catalogo inicial
      responses:
        "200":
          description: Catalogo SISCAT
          content:
            application/json:
              schema:
                type: object
                properties:
                  establishment:
                    $ref: "#/components/schemas/Establishment"
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/Module"
                  upss:
                    type: array
                    items:
                      $ref: "#/components/schemas/Upss"
                  services:
                    type: object
  /api/services:
    get:
      tags: [Catalogo]
      summary: Lista servicios de Consulta Externa
      responses:
        "200":
          description: Servicios disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: object
  /api/services/{servicio}/groups/{grupo}/items:
    get:
      tags: [Catalogo]
      summary: Lista items por servicio y grupo
      parameters:
        - name: servicio
          in: path
          required: true
          schema:
            type: string
            enum: [medicina, enfermeria, obstetricia]
          example: medicina
        - name: grupo
          in: path
          required: true
          schema:
            type: string
            enum: [infraestructura, equipamiento, rrhh]
          example: infraestructura
      responses:
        "200":
          description: Items del grupo
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
        "404":
          description: Servicio o grupo no encontrado
  /api/items/{item}:
    get:
      tags: [Catalogo]
      summary: Obtiene detalle de un item
      parameters:
        - name: item
          in: path
          required: true
          schema:
            type: string
          example: topico-lavamanos
      responses:
        "200":
          description: Item encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/ItemDetail"
        "404":
          description: Item no encontrado
  /api/captures:
    get:
      tags: [Capturas]
      summary: Lista capturas registradas
      responses:
        "200":
          description: Capturas guardadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  captures:
                    type: array
                    items:
                      $ref: "#/components/schemas/Capture"
    post:
      tags: [Capturas]
      summary: Registra un informe capturado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureRequest"
            examples:
              informe:
                value:
                  upss: CONSULTA EXTERNA
                  servicio: ""
                  componente: ""
                  grupo: ""
                  tipo_registro: equipment
                  item_id: ""
                  item: ""
                  detalle: ""
                  cumple: SI
                  cantidad: 0
                  observacion: ""
          multipart/form-data:
            schema:
              allOf:
                - $ref: "#/components/schemas/CaptureRequest"
                - type: object
                  properties:
                    "file[]":
                      type: array
                      items:
                        type: string
                        format: binary
      responses:
        "201":
          description: Captura creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  capture:
                    $ref: "#/components/schemas/Capture"
  /api/captures/{id}:
    delete:
      tags: [Capturas]
      summary: Elimina un informe capturado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: cap_121f980b2d532cdb
      responses:
        "200":
          description: Informe eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  capture:
                    type: object
                    properties:
                      id:
                        type: string
                      deleted:
                        type: boolean
                      files_deleted:
                        type: integer
        "404":
          description: Informe no encontrado
  /api/uploads/{archivo}:
    get:
      tags: [Capturas]
      summary: Obtiene un archivo cargado
      parameters:
        - name: archivo
          in: path
          required: true
          schema:
            type: string
          example: reemplazar-por-stored-name
      responses:
        "200":
          description: Archivo encontrado
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Archivo no encontrado
    delete:
      tags: [Capturas]
      summary: Elimina un archivo cargado
      parameters:
        - name: archivo
          in: path
          required: true
          schema:
            type: string
          example: reemplazar-por-stored-name
      responses:
        "200":
          description: Archivo eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      stored_name:
                        type: string
                      deleted:
                        type: boolean
        "404":
          description: Archivo no encontrado
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: demo-gob-backend
        time:
          type: string
          format: date-time
    Establishment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        network:
          type: string
        micro_network:
          type: string
        category:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        expires:
          type: string
          format: date
    Module:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        href:
          type: string
    Upss:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
    Item:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        required:
          type: string
        detail:
          type: string
        default_qty:
          type: integer
    ItemDetail:
      allOf:
        - $ref: "#/components/schemas/Item"
        - type: object
          properties:
            service_key:
              type: string
            service:
              type: string
            group_key:
              type: string
            group:
              type: string
    CaptureRequest:
      type: object
      properties:
        upss:
          type: string
          example: CONSULTA EXTERNA
        servicio:
          type: string
        componente:
          type: string
        grupo:
          type: string
        tipo_registro:
          type: string
          enum: [equipment, staff, compliance]
        item_id:
          type: string
        item:
          type: string
        detalle:
          type: string
        cumple:
          type: string
          enum: [SI, NO, NO APLICA]
        cantidad:
          type: integer
        cantidad_existente:
          type: integer
        cantidad_operativa:
          type: integer
        cantidad_inoperativa:
          type: integer
        modelo:
          type: string
        estado:
          type: string
        observacion:
          type: string
    Capture:
      type: object
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        establishment_id:
          type: string
        data:
          type: object
        files:
          type: array
          items:
            $ref: "#/components/schemas/CaptureFile"
    CaptureFile:
      type: object
      properties:
        name:
          type: string
        stored_name:
          type: string
        type:
          type: string
        size:
          type: integer
        status:
          type: string
          example: Cargado
        url:
          type: string
          example: /api/uploads/reemplazar-por-stored-name
